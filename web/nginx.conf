server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any unmatched route serves index.html so React Router can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Vite emits hashed filenames in /assets/, so we can cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Service worker and manifest must never be cached by the browser,
  # otherwise users get stuck on the previous version.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Data files: short cache so the update check picks up new versions promptly.
  location /data/ {
    expires 5m;
    add_header Cache-Control "public, must-revalidate";
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
  gzip_min_length 1024;
}
