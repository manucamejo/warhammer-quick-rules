services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_APP_VERSION: ${VITE_APP_VERSION:-dev}
    image: warhammer-web:latest
    container_name: warhammer-web
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.warhammer.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.warhammer.entrypoints=websecure"
      - "traefik.http.routers.warhammer.tls=true"
      - "traefik.http.routers.warhammer.tls.certresolver=letsencrypt"
      - "traefik.http.services.warhammer.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
